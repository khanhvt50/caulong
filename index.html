<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký cầu lông</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #6dd5ed, #2193b0);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:disabled {
  background: #999;
}

#msg {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>🏸 Đăng ký cầu lông</h2>

  <input type="text" id="name" placeholder="Nhập tên">

  <select id="day">
    <option>Thứ 2</option>
    <option>Thứ 3</option>
    <option>Thứ 4</option>
    <option>Thứ 5</option>
    <option>Thứ 6</option>
    <option>Thứ 7</option>
    <option>Chủ nhật</option>
  </select>

  <button id="btn" onclick="submitForm()">Đăng ký</button>

  <div id="msg"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyHSDTc0ktrWT-NitKkN-qjVYn5opVzhx8rc8Jrx94v2sX1ctgvVeQyINzK8y__qiO6/exec";

async function submitForm() {
  const name = document.getElementById("name").value.trim();
  const day = document.getElementById("day").value;
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");

  if (!name) {
    msg.innerHTML = "⚠️ Vui lòng nhập tên!";
    return;
  }

  msg.innerHTML = "⏳ Đang gửi...";
  btn.disabled = true;

  try {
    const res = await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({
        name: name,
        day: day
      })
    });

    const data = await res.json();

    if (data.status === "success") {
      msg.innerHTML = "✅ Đăng ký thành công!";
      document.getElementById("name").value = "";
    } else {
      msg.innerHTML = "❌ Lỗi từ server!";
    }

  } catch (err) {
    console.error(err);
    msg.innerHTML = "❌ Không kết nối được!";
  }

  btn.disabled = false;
}
</script>

</body>
</html>
